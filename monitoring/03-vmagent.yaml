---
# vmagent - Metrics collection agent
# Scrapes Kafka metrics and forwards to VictoriaMetrics
# Provides service discovery for Kubernetes services

# ServiceAccount for vmagent to discover services and endpoints
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmagent
  namespace: kafka-monitoring
---
# ClusterRole for service discovery
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vmagent
rules:
- apiGroups: [""]
  resources:
    - services
    - endpoints
    - pods
    - nodes
    - nodes/proxy
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
    - configmaps
  verbs: ["get"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---
# ClusterRoleBinding for vmagent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vmagent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vmagent
subjects:
- kind: ServiceAccount
  name: vmagent
  namespace: kafka-monitoring
---
# vmagent configuration for scraping Kafka metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-config
  namespace: kafka-monitoring
  labels:
    app: vmagent
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: 'kafka-playground'
        environment: 'local'

    scrape_configs:
    # Kafka JMX metrics via kafka-exporter
    - job_name: 'kafka-exporter'
      static_configs:
        - targets: ['kafka-exporter.kafka-learning:9308']
      scrape_interval: 30s
      metrics_path: /metrics

    # ZooKeeper JMX metrics
    - job_name: 'zookeeper'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - kafka-learning
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_label_app]
          action: keep
          regex: zookeeper
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          target_label: __address__
          regex: (.+)
          replacement: ${1}:7000

    # Self-monitoring - vmagent metrics
    - job_name: 'vmagent'
      static_configs:
        - targets: ['localhost:8429']

    # Kubernetes API server metrics (optional)
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
        - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: true
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

    # Node exporter metrics (if available)
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
        - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        insecure_skip_verify: true
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics
---
# vmagent deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  namespace: kafka-monitoring
  labels:
    app: vmagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmagent
  template:
    metadata:
      labels:
        app: vmagent
    spec:
      serviceAccountName: vmagent
      containers:
      - name: vmagent
        image: victoriametrics/vmagent:v1.97.1
        args:
          # Prometheus config file
          - -promscrape.config=/config/prometheus.yml
          # Remote write endpoint - VictoriaMetrics
          - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
          # HTTP listen address for self-monitoring
          - -httpListenAddr=:8429
          # Memory optimization
          - -memory.allowedPercent=80
          # Enable service discovery logging
          - -promscrape.discovery.concurrency=1
        ports:
        - containerPort: 8429
          name: http
        volumeMounts:
        - name: config
          mountPath: /config
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8429
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8429
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: vmagent-config
---
# Service for vmagent (for self-monitoring)
apiVersion: v1
kind: Service
metadata:
  name: vmagent
  namespace: kafka-monitoring
  labels:
    app: vmagent
spec:
  selector:
    app: vmagent
  ports:
  - port: 8429
    targetPort: 8429
    protocol: TCP
    name: http
  type: ClusterIP