---
# ZooKeeper StatefulSet Configuration
# Educational Focus: Understanding distributed coordination in Kafka
#
# ZooKeeper serves as the distributed coordination service for Kafka, handling:
# - Cluster metadata storage (topics, partitions, replicas)
# - Leader election for topic partitions
# - Broker registration and health monitoring
# - Configuration management and ACL storage

# Service for ZooKeeper client connections
# IMPORTANT: ClusterIP service for internal communication
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: kafka-learning
  labels:
    app: zookeeper
    service: zookeeper
spec:
  ports:
  - port: 2181
    name: client
    targetPort: 2181
  - port: 2888
    name: server
    targetPort: 2888
  - port: 3888
    name: leader-election
    targetPort: 3888
  - port: 7000
    name: prometheus
    targetPort: 7000
  - port: 8080
    name: admin
    targetPort: 8080
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: zookeeper
---
# Headless Service for ZooKeeper ensemble discovery
# Enables stable network identities: zk-0.zk-headless, zk-1.zk-headless, zk-2.zk-headless
apiVersion: v1
kind: Service
metadata:
  name: zk-headless
  namespace: kafka-learning
  labels:
    app: zookeeper
spec:
  ports:
  - port: 2181
    name: client
  - port: 2888
    name: server
  - port: 3888
    name: leader-election
  - port: 7000
    name: prometheus
  - port: 8080
    name: admin
  clusterIP: None
  selector:
    app: zookeeper
---
# ZooKeeper StatefulSet - 3-node ensemble
# StatefulSet provides:
# 1. Stable network identities (zk-0, zk-1, zk-2)
# 2. Ordered deployment and scaling
# 3. Persistent storage per replica
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zk
  namespace: kafka-learning
  labels:
    app: zookeeper
spec:
  serviceName: zk-headless
  replicas: 3
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
      annotations:
        # Enable Prometheus scraping for ZooKeeper JMX metrics
        prometheus.io/scrape: "true"
        prometheus.io/port: "7000"
        prometheus.io/path: "/metrics"
    spec:
      # Anti-affinity to spread ZooKeeper nodes across different nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - zookeeper
              topologyKey: kubernetes.io/hostname

      containers:
      - name: zookeeper
        image: docker.io/bitnamilegacy/zookeeper:3.9.0
        # Override command to set ZOO_SERVER_ID from hostname
        command:
        - /bin/bash
        - -c
        - |
          # Calculate server ID from hostname (zk-0->1, zk-1->2, zk-2->3)
          export ZOO_SERVER_ID=$((${HOSTNAME##*-} + 1))
          echo "Starting ZooKeeper with SERVER_ID=$ZOO_SERVER_ID for pod $HOSTNAME"
          # Start ZooKeeper with calculated server ID
          exec /opt/bitnami/scripts/zookeeper/entrypoint.sh /opt/bitnami/scripts/zookeeper/run.sh
        ports:
        - containerPort: 2181
          name: client
        - containerPort: 2888
          name: server
        - containerPort: 3888
          name: leader-election
        - containerPort: 7000
          name: prometheus
        - containerPort: 8080
          name: admin

        env:
        # Bitnami ZooKeeper configuration following official documentation
        # ZOO_SERVER_ID is calculated dynamically in the command override above

        # Server list for ensemble (comma-separated format)
        - name: ZOO_SERVERS
          value: "zk-0.zk-headless.kafka-learning.svc.cluster.local:2888:3888,zk-1.zk-headless.kafka-learning.svc.cluster.local:2888:3888,zk-2.zk-headless.kafka-learning.svc.cluster.local:2888:3888"

        # Client port (default: 2181)
        - name: ZOO_PORT_NUMBER
          value: "2181"

        # Performance settings (using Bitnami defaults)
        - name: ZOO_TICK_TIME
          value: "2000"
        - name: ZOO_INIT_LIMIT
          value: "10"
        - name: ZOO_SYNC_LIMIT
          value: "5"

        # Enable Prometheus metrics for monitoring
        - name: ZOO_ENABLE_PROMETHEUS_METRICS
          value: "yes"
        - name: ZOO_PROMETHEUS_METRICS_PORT_NUMBER
          value: "7000"

        # Admin server (enabled by default)
        - name: ZOO_ENABLE_ADMIN_SERVER
          value: "yes"
        - name: ZOO_ADMIN_SERVER_PORT_NUMBER
          value: "8080"

        # Log level for educational environment
        - name: ZOO_LOG_LEVEL
          value: "INFO"

        # 4LW commands whitelist for health checks
        - name: ZOO_4LW_COMMANDS_WHITELIST
          value: "srvr,mntr,ruok,stat"

        # JVM heap size (educational workload)
        - name: ZOO_HEAP_SIZE
          value: "512"

        # Allow anonymous login for educational environment
        # This is required by Bitnami containers when auth is not configured
        - name: ALLOW_ANONYMOUS_LOGIN
          value: "yes"

        # Resource limits for educational workload
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi

        # Persistent storage mount
        volumeMounts:
        - name: datadir
          mountPath: /bitnami/zookeeper

        # Health checks using whitelisted 4LW commands
        livenessProbe:
          exec:
            command: ["/bin/bash", "-c", "echo 'ruok' | nc localhost 2181 | grep imok"]
          initialDelaySeconds: 30
          periodSeconds: 30

        readinessProbe:
          tcpSocket:
            port: 2181
          initialDelaySeconds: 10
          periodSeconds: 10

      # Security context for Bitnami containers (UID/GID 1001)
      securityContext:
        fsGroup: 1001
        runAsUser: 1001
        runAsNonRoot: true

  # Persistent Volume Claim template
  # Each ZooKeeper replica gets its own 10Gi persistent volume
  volumeClaimTemplates:
  - metadata:
      name: datadir
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
      # Using default storage class for local development